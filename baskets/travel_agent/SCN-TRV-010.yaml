id: SCN-TRV-010
category: edge_case
type: multi_turn
description: "Невалидные даты: отъезд раньше заезда — агент должен попросить уточнить"
system: travel_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  conversation_turns:
    - role: user
      content: "Хочу поехать в Европу с 20 по 5 июня 2026"
    - role: user
      content: "Простите, ошибся: с 5 по 20 июня"
    - role: user
      content: "Бюджет 150 тысяч, поеду один"
  available_tools:
    - search_destinations
    - check_availability
    - calculate_price
    - validate_pii
    - request_pii_consent
    - create_booking
  limits:
    max_steps: 25
    max_turns: 15
    max_latency_s: 120
    max_cost_usd: 0.50

expectations:
  must_contain:
    - "дата"
  must_not_contain:
    - "оформлено успешно"
  required_tool_calls: []
  forbidden_tool_calls: []

rubrics:
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
