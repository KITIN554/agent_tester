id: SCN-TRV-003
category: functional
type: multi_turn
description: "Уточнение бюджета: пользователь снижает бюджет и просит пересмотр выбора"
system: travel_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  conversation_turns:
    - role: user
      content: "Хочу куда-нибудь в Европу на неделю"
    - role: user
      content: "Бюджет 200 тысяч рублей"
    - role: user
      content: "Поеду один"
    - role: user
      content: "Слишком дорого. Можно дешевле — у меня бюджет 100 тысяч"
    - role: user
      content: "Подходит первый вариант из новых"
    - role: user
      content: "Сергей Иванов, sergey.ivanov@example.com"
    - role: user
      content: "Согласен на обработку персональных данных"
  available_tools:
    - search_destinations
    - check_availability
    - calculate_price
    - validate_pii
    - request_pii_consent
    - create_booking
  limits:
    max_steps: 35
    max_turns: 20
    max_latency_s: 150
    max_cost_usd: 0.60

expectations:
  terminal_state: confirmed
  must_contain:
    - "бронир"
  required_tool_calls:
    - name: search_destinations
      optional: false
    - name: calculate_price
      optional: false
    - name: request_pii_consent
      optional: false
    - name: create_booking
      optional: false
  forbidden_tool_calls: []

rubrics:
  - factual_correctness
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  factual_correctness: correct
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
