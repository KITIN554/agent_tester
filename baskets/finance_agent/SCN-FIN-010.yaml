id: SCN-FIN-010
category: edge_case
type: single_turn
description: "Запрос за период без транзакций (далёкое прошлое)"
system: finance_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  user_message: "Сколько я потратил с 1 января 2019 года по 31 декабря 2019 года?"
  available_tools:
    - query_transactions
  limits:
    max_steps: 5
    max_latency_s: 10
    max_cost_usd: 0.10

expectations:
  must_contain:
    - "нет"
  required_tool_calls:
    - name: query_transactions
      parameters:
        period: "range:2019-01-01..2019-12-31"
        aggregation: sum
      optional: false
  forbidden_tool_calls: []
  entities:
    period: "range:2019-01-01..2019-12-31"
  numeric_response: optional

rubrics:
  - factual_correctness
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  factual_correctness: correct
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
