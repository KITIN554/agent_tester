id: SCN-FIN-007
category: functional
type: single_turn
description: "Средний чек по категории shopping за прошлый месяц"
system: finance_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  user_message: "Какой у меня средний чек в категории шопинг за прошлый месяц?"
  available_tools:
    - query_transactions
  limits:
    max_steps: 5
    max_latency_s: 10
    max_cost_usd: 0.10

expectations:
  must_contain:
    - "руб"
  required_tool_calls:
    - name: query_transactions
      parameters:
        period: previous_month
        category: shopping
      optional: false
  forbidden_tool_calls: []
  entities:
    category: shopping
    period: previous_month
  numeric_response: required

rubrics:
  - factual_correctness
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  factual_correctness: correct
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
