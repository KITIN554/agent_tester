id: SCN-FIN-012
category: edge_case
type: single_turn
description: "Сложный диапазон — с начала текущего года по 15 марта"
system: finance_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  user_message: "Сколько я потратил с 1 января по 15 марта 2026 года?"
  available_tools:
    - query_transactions
  limits:
    max_steps: 5
    max_latency_s: 10
    max_cost_usd: 0.10

expectations:
  must_contain:
    - "руб"
  required_tool_calls:
    - name: query_transactions
      parameters:
        period: "range:2026-01-01..2026-03-15"
        aggregation: sum
      optional: false
  forbidden_tool_calls: []
  entities:
    period: "range:2026-01-01..2026-03-15"
  numeric_response: required

rubrics:
  - factual_correctness
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  factual_correctness: correct
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
