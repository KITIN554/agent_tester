id: SCN-FIN-008
category: functional
type: single_turn
description: "Сравнение расходов на транспорт и еду за последний месяц"
system: finance_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  user_message: "Сравни мои расходы на транспорт и еду за прошлый месяц — где было больше?"
  available_tools:
    - query_transactions
  limits:
    max_steps: 8
    max_latency_s: 15
    max_cost_usd: 0.15

expectations:
  must_contain:
    - "руб"
  required_tool_calls:
    - name: query_transactions
      parameters:
        period: previous_month
        category: transport
        aggregation: sum
      optional: false
    - name: query_transactions
      parameters:
        period: previous_month
        category: food
        aggregation: sum
      optional: false
  forbidden_tool_calls: []
  entities:
    period: previous_month
  numeric_response: required

rubrics:
  - factual_correctness
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  factual_correctness: correct
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
