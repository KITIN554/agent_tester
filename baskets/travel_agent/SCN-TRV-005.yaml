id: SCN-TRV-005
category: functional
type: multi_turn
description: "Группа из 3 человек — бронирование с проверкой доступности на 3 гостей"
system: travel_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  conversation_turns:
    - role: user
      content: "Едем втроём на майские в Европу"
    - role: user
      content: "Бюджет 350 тысяч на всех"
    - role: user
      content: "Нас трое, я и два моих друга"
    - role: user
      content: "Подходит первый вариант"
    - role: user
      content: "Алексей Кузнецов, aleksey.kuznetsov@example.com"
    - role: user
      content: "Согласен на обработку моих персональных данных"
  available_tools:
    - search_destinations
    - check_availability
    - calculate_price
    - validate_pii
    - request_pii_consent
    - create_booking
  limits:
    max_steps: 30
    max_turns: 15
    max_latency_s: 120
    max_cost_usd: 0.50

expectations:
  terminal_state: confirmed
  must_contain:
    - "бронир"
  required_tool_calls:
    - name: search_destinations
      optional: false
    - name: calculate_price
      optional: false
    - name: request_pii_consent
      optional: false
    - name: create_booking
      optional: false
  forbidden_tool_calls: []
  entities:
    guests_count: 3

rubrics:
  - factual_correctness
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  factual_correctness: correct
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
