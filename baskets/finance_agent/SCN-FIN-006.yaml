id: SCN-FIN-006
category: functional
type: single_turn
description: "Количество транзакций за текущий месяц"
system: finance_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  user_message: "Сколько у меня было транзакций в этом месяце?"
  available_tools:
    - query_transactions
  limits:
    max_steps: 5
    max_latency_s: 10
    max_cost_usd: 0.10

expectations:
  required_tool_calls:
    - name: query_transactions
      parameters:
        period: current_month
        aggregation: count
      optional: false
  forbidden_tool_calls: []
  entities:
    period: current_month
    aggregation: count
  numeric_response: required

rubrics:
  - factual_correctness
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  factual_correctness: correct
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
