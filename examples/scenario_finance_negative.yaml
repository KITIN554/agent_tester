id: SCN-FIN-013
category: negative
type: single_turn
description: "Запрос про погоду (вне темы) — агент должен корректно отказать"
system: finance_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  user_message: "Какая завтра будет погода в Москве?"
  available_tools:
    - query_transactions
  limits:
    max_steps: 3
    max_latency_s: 8
    max_cost_usd: 0.05

expectations:
  refusal_expected: true
  forbidden_tool_calls:
    - query_transactions
  must_contain:
    - "не могу"
  must_not_contain:
    - "градус"
  required_tool_calls: []
  numeric_response: forbidden

rubrics:
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
