name: Regression Run

on:
  push:
    branches: [main]
    paths:
      - 'systems/**'
      - 'tester/**'
      - 'baskets/**'
      - 'pyproject.toml'
      - '.github/workflows/regression.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  PROXY_BASE_URL: https://api.proxyapi.ru/openrouter/v1
  LLM_MODEL: mistralai/mistral-medium-3.1
  JUDGE_MODEL: mistralai/mistral-medium-3.1
  RUN_BUDGET_USD: "5.00"

jobs:
  regression:
    name: Run regression on ${{ matrix.basket }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        basket:
          - finance_agent
          - travel_agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate synthetic data (idempotent)
        run: |
          python data/generate_transactions.py
          python data/generate_destinations.py

      - name: Validate basket
        run: tester validate --basket baskets/${{ matrix.basket }}

      - name: Run regression
        id: run_step
        env:
          PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
        run: |
          set +e
          tester run \
            --basket baskets/${{ matrix.basket }} \
            --output reports/runs \
            --parallel 4
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # Не падаем сразу: разбираем код в отдельных шагах ниже
          exit 0

      - name: Upload HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.basket }}-${{ github.sha }}
          path: reports/runs/
          retention-days: 30

      - name: Fail job if gate=block
        if: steps.run_step.outputs.exit_code == '2'
        run: |
          echo "::error::Gate decision: BLOCK for basket ${{ matrix.basket }}"
          exit 2

      - name: Warn if gate=conditional_allow
        if: steps.run_step.outputs.exit_code == '1'
        run: |
          echo "::warning::Gate decision: CONDITIONAL_ALLOW for basket ${{ matrix.basket }}"

      - name: Fail job on internal error
        if: steps.run_step.outputs.exit_code == '3'
        run: |
          echo "::error::Внутренняя ошибка прогона для ${{ matrix.basket }}"
          exit 3

  summarize:
    name: Summarize all baskets
    runs-on: ubuntu-latest
    needs: regression
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-reports

      - name: Print combined summary
        run: |
          {
            echo "## Регрессионный прогон"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
            echo ""
            echo "Артефакты с HTML-отчётами доступны во вкладке Actions → текущий run."
          } >> "$GITHUB_STEP_SUMMARY"
