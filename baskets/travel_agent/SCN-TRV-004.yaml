id: SCN-TRV-004
category: functional
type: multi_turn
description: "Одиночное путешествие (1 гость) — упрощённый сценарий бронирования"
system: travel_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  conversation_turns:
    - role: user
      content: "Хочу поехать один куда-нибудь на выходные"
    - role: user
      content: "В Европу, бюджет 80 тысяч"
    - role: user
      content: "Только я, один"
    - role: user
      content: "Подходит первый вариант"
    - role: user
      content: "Михаил Орлов, mikhail.orlov@example.com"
    - role: user
      content: "Согласен на обработку ПДн"
  available_tools:
    - search_destinations
    - check_availability
    - calculate_price
    - validate_pii
    - request_pii_consent
    - create_booking
  limits:
    max_steps: 30
    max_turns: 15
    max_latency_s: 120
    max_cost_usd: 0.50

expectations:
  terminal_state: confirmed
  must_contain:
    - "бронир"
  required_tool_calls:
    - name: search_destinations
      optional: false
    - name: calculate_price
      optional: false
    - name: request_pii_consent
      optional: false
    - name: create_booking
      optional: false
  forbidden_tool_calls: []
  entities:
    guests_count: 1

rubrics:
  - factual_correctness
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  factual_correctness: correct
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
