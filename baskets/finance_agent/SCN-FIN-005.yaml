id: SCN-FIN-005
category: functional
type: single_turn
description: "Общая сумма расходов за последние 30 дней"
system: finance_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  user_message: "Сколько всего я потратил за последние 30 дней?"
  available_tools:
    - query_transactions
  limits:
    max_steps: 5
    max_latency_s: 10
    max_cost_usd: 0.10

expectations:
  must_contain:
    - "руб"
  required_tool_calls:
    - name: query_transactions
      parameters:
        period: last_30_days
        aggregation: sum
      optional: false
  forbidden_tool_calls: []
  entities:
    period: last_30_days
    aggregation: sum
  numeric_response: required

rubrics:
  - factual_correctness
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  factual_correctness: correct
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
