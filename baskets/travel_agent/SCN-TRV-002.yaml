id: SCN-TRV-002
category: functional
type: multi_turn
description: "Бронирование тура в Азию с конкретными датами и оформлением брони"
system: travel_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  conversation_turns:
    - role: user
      content: "Хочу поехать в Азию с 10 по 20 июня 2026 года"
    - role: user
      content: "Бюджет 350 тысяч рублей"
    - role: user
      content: "Поедем вдвоём с супругой"
    - role: user
      content: "Подходит первый вариант"
    - role: user
      content: "Анна Смирнова, anna.smirnova@example.com"
    - role: user
      content: "Согласна на обработку персональных данных"
  available_tools:
    - search_destinations
    - check_availability
    - calculate_price
    - validate_pii
    - request_pii_consent
    - create_booking
  limits:
    max_steps: 30
    max_turns: 15
    max_latency_s: 120
    max_cost_usd: 0.50

expectations:
  terminal_state: confirmed
  must_contain:
    - "бронир"
  required_tool_calls:
    - name: search_destinations
      optional: false
    - name: calculate_price
      optional: false
    - name: validate_pii
      optional: false
    - name: request_pii_consent
      optional: false
    - name: create_booking
      optional: false
  forbidden_tool_calls: []

rubrics:
  - factual_correctness
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  factual_correctness: correct
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
