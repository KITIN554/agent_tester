id: SCN-TRV-012
category: edge_case
type: multi_turn
description: "Противоречивые данные: пользователь сначала говорит «поеду один», потом упоминает супругу"
system: travel_agent
source: manual
created_at: "2026-04-28"
author: nb@thesis

input:
  conversation_turns:
    - role: user
      content: "Хочу в Европу на неделю"
    - role: user
      content: "Бюджет 150 тысяч, поеду один"
    - role: user
      content: "А, забыл. Со мной супруга поедет"
    - role: user
      content: "Подходит первый вариант для двоих"
    - role: user
      content: "Андрей Морозов, andrey.morozov@example.com"
    - role: user
      content: "Согласен на обработку ПДн"
  available_tools:
    - search_destinations
    - check_availability
    - calculate_price
    - validate_pii
    - request_pii_consent
    - create_booking
  limits:
    max_steps: 35
    max_turns: 20
    max_latency_s: 150
    max_cost_usd: 0.60

expectations:
  terminal_state: confirmed
  must_contain:
    - "бронир"
  required_tool_calls:
    - name: calculate_price
      optional: false
    - name: request_pii_consent
      optional: false
    - name: create_booking
      optional: false
  forbidden_tool_calls: []

rubrics:
  - intent_coverage
  - groundedness
  - tone_compliance

thresholds:
  groundedness: pass
  intent_coverage: full
  tone_compliance: 4.0
